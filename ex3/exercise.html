<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Links</title>
  </head>
  <body>
    <h1>Links in HTML</h1>

    <!-- External link - opens another website -->
    <p>Visit: <a href="https://www.google.com">Google</a></p>

    <!-- Opens in a new tab -->
    <p>
      Open in new tab:
      <a href="https://www.youtube.com" target="_blank">YouTube</a>
    </p>

    <!-- Link to another HTML file in same folder -->
    <p><a href="exercise.html">Reload this page</a></p>

    <!-- Email link -->
    <p><a href="mailto:you@example.com">Send me an email</a></p>

    <!-- Link that goes to top of the page -->
    <p><a href="#">Back to Top</a></p>

    <hr />

    <h2>Jump Links (Anchors)</h2>
    <p><a href="#section2">Jump to Section 2 below</a></p>

    <br /><br /><br /><br /><br /><br />

    <h2 id="section2">Section 2 is here!</h2>
    <p>You jumped to this section using an anchor link.</p>
  </body>
</html>
