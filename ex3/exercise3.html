<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Links and Images</title>
</head>
<body>

  <h1>Links and Images</h1>

  <!-- Basic link -->
  <h2>Links</h2>
  <a href="https://www.google.com">Go to Google</a>

  <br><br>

  <!-- Link opens in new tab -->
  <a href="https://www.wikipedia.org" target="_blank">Open Wikipedia in new tab</a>

  <br><br>

  <!-- Link to another HTML file in same folder -->
  <a href="../ex1/exercise1.html">Go to Exercise 1</a>

  <br><br>

  <!-- Email link -->
  <a href="mailto:hello@example.com">Send Email</a>

  <hr>

  <!-- Image from internet -->
  <h2>Images</h2>
  <img src="https://via.placeholder.com/300x200" alt="A placeholder image" width="300" height="200">

  <br><br>

  <!-- Image with title tooltip -->
  <img
    src="https://via.placeholder.com/200x150/ff6b6b/ffffff?text=HTML"
    alt="HTML text image"
    title="Hover over me!"
    width="200"
  >

</body>
</html>
