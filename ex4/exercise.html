<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Images</title>
  </head>
  <body>
    <h1>Images in HTML</h1>

    <!-- Image from the internet (URL) -->
    <h2>Image from a URL</h2>
    <img
      src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Good_Food_Display_-_NCI_Visuals_Online.jpg/320px-Good_Food_Display_-_NCI_Visuals_Online.jpg"
      alt="A display of healthy food"
    />

    <hr />

    <!-- Image with custom width and height -->
    <h2>Image with Custom Size</h2>
    <img
      src="https://via.placeholder.com/300x150"
      alt="Placeholder image"
      width="300"
      height="150"
    />

    <hr />

    <!-- Image as a link -->
    <h2>Clickable Image (Image as a Link)</h2>
    <a href="https://www.wikipedia.org" target="_blank">
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Wikipedia-logo-v2.svg/100px-Wikipedia-logo-v2.svg.png"
        alt="Wikipedia Logo"
      />
    </a>
    <p>Click the image above to go to Wikipedia.</p>
  </body>
</html>
